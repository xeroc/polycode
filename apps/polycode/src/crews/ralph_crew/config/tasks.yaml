implement_task:
  description: |
    ## Implementation of individual stories

    ### STORY TO IMPLEMENT:
    {story}

    ### TASK:
    {task}

    ### ENVIRONMENT:
    - REPO: {repo}
    - BRANCH: {branch}
    - BUILD_CMD: {build_cmd}

    ### PREVIOUS ERRORS (from earlier stories):
    {previous_errors}

    {% for key, value in injected %}
    # {{key}}

    {{value}}
    {% endfor %}

    ### AVAILABLE TOOLS:
    - FileReadTool: Read file contents
    - FileWriterTool: Write/modify files
    - DirectoryReadTool: List directory structure
    - ExecTool: Run shell commands (npm, etc.)

    ### INSTRUCTIONS:

    1. Implement → feature described in the story
    2. Keep changes minimal and focused
    3. Follow existing code patterns in the repo
    4. If previous_errors are provided, AVOID those specific mistakes
    5. Report → what was changed

  expected_output: |
  agent: implementer

commit_message_task:
  description: |
    Generate a conventional commit message for the changes of our impolementer.

    ### COMMIT MESSAGE FORMAT:
    - title: `<type>(<scope>): <subject>` (max 72 chars)
    - message: Body explaining what and why (wrapped at 72 chars)
    - footer: Breaking changes or issue refs (optional)

    Types: feat, fix, docs, style, refactor, perf, test, chore
  expected_output: |
    RalphOutput with:
    - changes: What was implemented
    - title: Commit message title
    - message: Commit message body
    - footer: Commit footer (empty if none)
  agent: summarizer
