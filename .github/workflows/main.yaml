name: Test, build and deploy for Production

on:
  workflow_call:
  workflow_dispatch:
  push:
    paths:
      - apps/polycode/**
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yaml

  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: test
    outputs:
      new_version: ${{ steps.release.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: main
          # You can specify specifying version range for the extra plugins if you prefer.
          # extra_plugins: |
          #   @semantic-release/changelog@6.0.0
          #   @semantic-release/git

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: semantic-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Publish package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd apps/polycode
          uv version "${{ needs.semantic-release.outputs.version }}"
          uv build
          uv publish --token $PYPI_API_TOKEN

  build:
    uses: ./.github/workflows/build.yaml
    secrets: inherit
    needs: semantic-release
    with:
      version: "${{ github.ref_name }}.${{ github.run_number }}"
      registry: ghcr.io
      image: xeroc/polycode
      package: apps/polycode

  deploy:
    uses: ./.github/workflows/deploy.yaml
    secrets: inherit
    needs: build
    with:
      version: "${{ github.ref_name }}.${{ github.run_number }}"
      version_name: polycode_image_version
      stack: polycode/polycode/prod
      env: prod
      path: polycode/
