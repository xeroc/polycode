name: Test, build and deploy for Production

on:
  push:
    branches:
      - main

jobs:
  test:
    uses: ./.github/workflows/test.yaml

  build:
    uses: ./.github/workflows/build.yaml
    secrets: inherit
    needs: test
    with:
      version: "${{ github.ref_name }}.${{ github.run_number }}"
      registry: ghcr.io
      image: xeroc/polycode
      package: apps/polycode

  deploy:
    uses: ./.github/workflows/deploy.yaml
    secrets: inherit
    needs: build
    with:
      version: "${{ github.ref_name }}.${{ github.run_number }}"
      version_name: polycode_image_version
      stack: polycode/polycode/prod
      env: prod
      path: polycode/
