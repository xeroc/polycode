name: Test, build and deploy for Production

on:
  workflow_call:
  workflow_dispatch:
  push:
    paths:
      - apps/polycode/**
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yaml

  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: test
    outputs:
      new_version: ${{ steps.release.outputs.version }}
      released: ${{ steps.release.outputs.released }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --all-extras --dev
        working-directory: apps/polycode/

      - name: Install python-semantic-release
        run: pip install python-semantic-release

      - name: setup git
        run: |
          git config --global user.email "polycode@polycode.dev"
          git config --global user.name "Polycode pipeline"

      - name: Run Semantic Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: apps/polycode/
        run: |
          semantic-release version \
            --no-commit \
            --tag \
            --push \
            --vcs-release \
            --no-changelog

          VERSION=$(semantic-release version --print-tag 2>/dev/null || echo "")

          if [ -n "$VERSION" ] && [ "$VERSION" != "0.0.0" ]; then
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: apps/polycode/dist/

  build:
    uses: ./.github/workflows/build.yaml
    secrets: inherit
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    with:
      version: "${{ needs.semantic-release.outputs.new_version }}"
      registry: ghcr.io
      image: xeroc/polycode
      package: apps/polycode

  deploy:
    uses: ./.github/workflows/deploy.yaml
    secrets: inherit
    needs:
      - build
      - semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    with:
      version: "${{ needs.semantic-release.outputs.new_version }}"
      version_name: polycode/polycode_image_version
      stack: polycode/polycode/prod
      env: prod
      path: polycode/
