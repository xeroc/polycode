setup_task:
  description: >
    Prepare the development environment for this feature.

    TASK:
    {task}

    REPO: {repo}
    BRANCH: {branch}

    CREWAI REFERENCE GUIDE (AGENTS.md):
    {agents_md}

    TOOLS:
    - DirectoryReadTool: Read the directory structure
    - FileReadTool: Read the content of a file
    - AgentsMDLoaderTool: Load AGENTS.md files from subdirectories (use when needed)

    !CRUCIAL!:
    * Do not run DirectoryReadTool outside the repositories path. There's nothing of interest there!
    * Do not attempt to read or write any file outside the repositories path!

    Instructions:
    1. cd into the repo
    2. Read configuration files (package.json, pyproject, etc..), CI config, test config to understand the build/test setup
    3. Ensure .gitignore exists — if missing, create one appropriate for detected stack (must include .env, node_modules/, *.key, *.pem at minimum)
    4. Run the build to establish a baseline
    5. Run the tests to establish a baseline
    6. Report what you found and what can be reused
    7. Understand the stack, conventions, and patterns

  expected_output: >
    Structured information about build_cmd, test_cmd, ci notes, baseline, findings, purpose, tech stack, architecture, entry points, configuration, documentation,
  agent: setup

plan_task:
  description: >
    Decompose the following task into ordered user stories for autonomous execution.

    TASK:
    {task}

    REPO:
    {repo}

    CREWAI REFERENCE GUIDE (AGENTS.md):
    {agents_md}

    !CRUCIAL!:
    * Do not build tests for static files (html, css)
    * Only build behavioral tests.

    Instructions:
    1. Break the task into small user stories (max 20, min 1)
    2. Take findings and baseline into account when planning user stories
    3. Order by dependency: schema/DB first, backend, frontend, integration
    4. Each story must fit in one developer session (one context window)
    5. Every acceptance criterion must be mechanically verifiable
    6. Always include "Typecheck passes" as the last criterion in every story
    7. Every story should include test criteria — "Tests for [feature] pass" (except for marginal stories, static sites, changes that do not modify behavior)
    8. The developer is expected to write tests as part of each story (except for small stories with little impact)
    9. avoid end-2-end tests, prefer small unittests
  expected_output: >
    Structured information (valid json) about build_cmd, test_cmd, ci notes, baseline, findings, purpose, tech stack, architecture, entry points, configuration, documentation, and stories.
  context:
    - setup_task
  agent: planner
